<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Royal Kitchen</title>
    <link rel="stylesheet" href="13.contact-only.css">
</head>
<body>
    <header class="navbar">
    <div class="logo">Royal Kitchen</div>

    <nav>
        <ul class="nav-links">
            <li><a href="1.index.html">Home</a></li>
            <li><a href="3.menu.html">Menu</a></li>
            <li><a href="5.cart.html">Cart</a></li>
            <li><a href="8.login.html">Login</a></li>
            <li><a href="10.register.html">Register</a></li>
            <li><a href="12.contact.html">Contact</a></li>
            <li><a href="14.order.html">Order</a></li>
        </ul>
    </nav>
</header>
    <div class="contact-wrapper">
        <div class="contact-box">
            
            <div class="contact-header">
                <h2>ROYAL KITCHEN</h2>
                <p>Have questions or feedback? Drop us a message below!</p>
            </div>

            <form id="premiumContactForm">
                <div class="input-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="Enter your name" required>
                </div>

                <div class="input-group">
                    <label for="userEmail">Email Address</label>
                    <input type="email" id="userEmail" placeholder="Enter your email" required>
                </div>

                <div class="input-group">
                    <label for="userMessage">Password / Message</label>
                    <textarea id="userMessage" rows="4" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
            </form>

            <div class="contact-footer">
                <p>Want to go back? <a href="1.index.html">Back to Home</a></p>
            </div>

        </div>
    </div>

    <script src="contact.js">
        
    </script>

</body>
</html>
